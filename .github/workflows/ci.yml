name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (no [hf] extra — CI runs fully offline)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        run: mypy src

      - name: Tests + coverage
        # The benchmark regression gate lives in tests/test_bench.py as real asserts on
        # precision/recall/discovery — there is no grep-based whitelist anywhere.
        run: pytest --cov=rewardfuzz --cov-report=term-missing --cov-fail-under=80

      - name: Benchmark (deterministic, no API key)
        # Re-run the benchmark end-to-end through the CLI to prove the published numbers reproduce.
        run: rewardfuzz bench --quick
